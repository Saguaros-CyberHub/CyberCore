networks:
  cybercore-net:
    driver: bridge

volumes:
  cybercore-redis-data:
  cybercore-postgres-data:
  cybercore-caddy-data:
  cybercore-caddy-config:

services:
  # ============================================================================
  # POSTGRES — Single instance hosting cybercore_db + plugin databases
  # ============================================================================
  postgres:
    image: postgres:17
    container_name: cybercore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
      POSTGRES_DB: ${CORE_DB_NAME}
      CORE_DB_USER: ${CORE_DB_USER}
      CORE_DB_PASSWORD: ${CORE_DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ENABLED_MODULES: ${CORE_ENABLED_MODULES}
      GUAC_DB_USER: ${GUAC_DB_USER:-guacamole_user}
      GUAC_DB_PASSWORD: ${GUAC_DB_PASSWORD}
      GUAC_DB_NAME: ${GUAC_DB_NAME:-guacamole_db}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - cybercore-postgres-data:/var/lib/postgresql/data
      - ./config/postgres/001_init_db.sql:/docker-entrypoint-initdb.d/001_init_db.sql:ro,z
      - ./config/postgres/003_cyberhub_modules.sql:/docker-entrypoint-initdb.d/003_cyberhub_modules.sql:ro,z
      - ./config/postgres/004_site_settings.sql:/docker-entrypoint-initdb.d/004_site_settings.sql:ro,z
      - ./config/postgres/005_admin_user.sh:/docker-entrypoint-initdb.d/005_admin_user.sh:ro,z
      - ./config/postgres/010_guacamole.sh:/docker-entrypoint-initdb.d/010_guacamole.sh:ro,z
      - ./config/postgres/050_apply_modules.sh:/docker-entrypoint-initdb.d/050_apply_modules.sh:ro,z
      - ./config/postgres/modules:/docker-entrypoint-initdb.d/modules:ro,z
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CORE_DB_USER} -d ${CORE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybercore-net

  # ============================================================================
  # REDIS — Cache, queues, idempotency
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: cybercore-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - cybercore-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybercore-net

  # ============================================================================
  # CYBERHUB APP — Node.js/Express application
  # ============================================================================
  app:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: cybercore-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      guacamole:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      # CyberCore DB (single source of truth for users, modules, lanes)
      CYBERCORE_DB_HOST: postgres
      CYBERCORE_DB_PORT: 5432
      CYBERCORE_DB_NAME: ${CORE_DB_NAME}
      CYBERCORE_DB_USER: ${CORE_DB_USER}
      CYBERCORE_DB_PASSWORD: ${CORE_DB_PASSWORD}
      # CIAB / legacy plugin DB
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: clinic_db
      DB_USER: ${CORE_DB_USER}
      DB_PASSWORD: ${CORE_DB_PASSWORD}
      # Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      SESSION_SECRET: ${SESSION_SECRET}
      COOKIE_SECURE: "false"
      # HMAC key for /vuln-assets signed download URLs (see utils/signed-url.js).
      VULN_ASSETS_SECRET: ${VULN_ASSETS_SECRET}
      # Encrypts TOTP/MFA secrets at rest; falls back to GUAC_ENCRYPT_KEY if unset.
      MFA_ENCRYPT_KEY: ${MFA_ENCRYPT_KEY}
      # Anthropic API — all AI generation (profile gen, policy gen, examples,
      # chat, interview, vuln-app). See front-end/src/utils/llm-client.js.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-claude-sonnet-4-5}
      LLM_MAX_CONCURRENT: ${LLM_MAX_CONCURRENT:-6}
      # Internal URL lane web VMs use to PULL prebuilt vuln-app images (HTTP, no
      # TLS — busybox wget on the web template). Lane egress SNATs to the gateway
      # WAN IP, reaching this via the same path lane-bootstrap uses. Override if
      # the orchestrator's lab IP differs. See utils/vuln-app-builder.js.
      CYBERCORE_INTERNAL_URL: ${CYBERCORE_INTERNAL_URL:-http://100.100.20.50:80}
      # Guacamole — internal service, always points to compose container
      GUAC_ENABLED: "true"
      GUAC_PUBLIC_BASE_URL: /guacamole
      GUAC_API_URL: http://guacamole:8080/guacamole
      GUAC_ADMIN_USER: ${GUAC_ADMIN_USER}
      GUAC_ADMIN_PASSWORD: ${GUAC_ADMIN_PASSWORD}
      GUAC_DATASOURCE: postgresql
      GUAC_DB_HOST: postgres
      GUAC_DB_NAME: ${GUAC_DB_NAME:-guacamole_db}
      GUAC_DB_USER: ${GUAC_DB_USER:-guacamole_user}
      GUAC_DB_PASSWORD: ${GUAC_DB_PASSWORD}
      # Proxmox
      PROXMOX_API_URL: ${PROXMOX_API_URL}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET}
      # Tailscale BYOAB (used by v2 lane bootstrap to mint per-lane auth keys)
      TAILSCALE_OAUTH_CLIENT_ID: ${TAILSCALE_OAUTH_CLIENT_ID}
      TAILSCALE_OAUTH_CLIENT_SECRET: ${TAILSCALE_OAUTH_CLIENT_SECRET}
      TAILSCALE_TAILNET: ${TAILSCALE_TAILNET}
      TAILSCALE_LANE_TAG: ${TAILSCALE_LANE_TAG:-tag:lane}
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    # External DNS so api.tailscale.com (and any other public hostnames the
    # orchestrator hits) resolve. Lab DNS at 100.100.0.1 doesn't recurse to
    # the public internet, so fetch() throws EAI_AGAIN on Tailscale calls
    # without an internet-capable resolver in front. Order matters: Docker
    # tries entries top-to-bottom.
    dns:
      - 1.1.1.1
      - 100.100.0.1
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./config/site.json:/config/site.json:ro
      - ./front-end/plugins:/app/plugins:rw
      - ./front-end/profiles:/app/profiles:rw
      - ./front-end/vuln-assets:/app/vuln-assets:ro
      - ./logs:/app/logs:rw
      # Built vuln-app image tarballs, served over HTTP to lane web VMs.
      - ./front-end/vuln-builds:/app/vuln-builds:rw
      # DooD — the CIAB vuln-app builder runs `docker build` + `docker save`
      # against the orchestrator VM's daemon. Reverted from a kaniko-only
      # approach because kaniko-in-container extracts each build's base image
      # into / and clobbers the running app container (curl, apk, /etc/os-release
      # all get overwritten with Debian/glibc files). The security tradeoff is
      # accepted: anything with code-execution inside this container can reach
      # orchestrator-VM root via `docker run -v /:/host`. Blast radius is this
      # VM only — not Proxmox.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cybercore-net

  # ============================================================================
  # ADMINER — Lightweight DB management UI
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: cybercore-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "0.0.0.0:8181:8080"
    networks:
      - cybercore-net

  # ============================================================================
  # GUACD — Guacamole proxy daemon (speaks RDP/VNC/SSH, never exposed)
  # ============================================================================
  guacd:
    image: guacamole/guacd:1.5.5
    container_name: cybercore-guacd
    restart: unless-stopped
    networks:
      - cybercore-net

  # ============================================================================
  # GUACAMOLE INIT — One-shot job: downloads and applies the Guacamole
  # PostgreSQL schema against the already-created guacamole_db. Skips
  # gracefully if tables already exist. Runs before guacamole starts.
  # ============================================================================
  guacamole-init:
    image: postgres:17
    container_name: cybercore-guacamole-init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${GUAC_DB_PASSWORD}
      GUAC_DB_HOST: postgres
      GUAC_DB_NAME: ${GUAC_DB_NAME:-guacamole_db}
      GUAC_DB_USER: ${GUAC_DB_USER:-guacamole_user}
    volumes:
      - ./config/guacamole/init-schema.sh:/init-schema.sh:ro,z
      - ./config/guacamole:/schema:ro,z
    entrypoint: ["/bin/sh", "/init-schema.sh"]
    networks:
      - cybercore-net

  # ============================================================================
  # GUACAMOLE — Web app / clientless remote desktop gateway
  # Not exposed directly — accessed through Caddy at /guacamole/
  # ============================================================================
  guacamole:
    image: guacamole/guacamole:1.5.5
    container_name: cybercore-guacamole
    restart: unless-stopped
    depends_on:
      guacd:
        condition: service_started
      guacamole-init:
        condition: service_completed_successfully
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: ${GUAC_DB_NAME:-guacamole_db}
      POSTGRESQL_USER: ${GUAC_DB_USER:-guacamole_user}
      POSTGRESQL_PASSWORD: ${GUAC_DB_PASSWORD}
    networks:
      - cybercore-net

  # ============================================================================
  # CADDY — Reverse proxy and automatic HTTPS
  # Routes / → app:3000 and /guacamole/* → guacamole:8080
  # Set CYBERHUB_HOST=yourdomain.example.edu for auto-HTTPS via Let's Encrypt.
  # Set CYBERHUB_HOST=:80 to disable HTTPS (offline / LAN mode).
  # ============================================================================
  caddy:
    image: caddy:2-alpine
    container_name: cybercore-caddy
    restart: unless-stopped
    depends_on:
      - app
      - guacamole
    environment:
      CYBERHUB_HOST: ${CYBERHUB_HOST}
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - cybercore-caddy-data:/data
      - cybercore-caddy-config:/config
    networks:
      - cybercore-net

  # ============================================================================
  # FTP — File transfer for profile delivery
  # ============================================================================
  ftp:
    image: fauria/vsftpd:latest
    container_name: cybercore-ftp
    restart: unless-stopped
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASSWORD}
      PASV_ADDRESS: 0.0.0.0
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    ports:
      - "0.0.0.0:21:21"
      - "21100-21110:21100-21110"
    volumes:
      - ./front-end/profiles:/home/vsftpd/${FTP_USER}:rw
    networks:
      - cybercore-net