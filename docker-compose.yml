networks:
  cybercore-net:
    driver: bridge

volumes:
  cybercore-redis-data:
  cybercore-n8n-data:
  cybercore-postgres-data:

services:
  # ============================================================================
  # POSTGRES — Single instance hosting cybercore_db + plugin databases
  # ============================================================================
  postgres:
    image: postgres:17
    container_name: cybercore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
      POSTGRES_DB: ${CORE_DB_NAME}
      ENABLED_MODULES: ${CORE_ENABLED_MODULES}
      N8N_DB_USER: ${N8N_DB_USER}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_DB_NAME: ${N8N_DB_NAME}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - cybercore-postgres-data:/var/lib/postgresql/data
      - ./config/postgres/001_init_db.sql:/docker-entrypoint-initdb.d/001_init_db.sql:ro,z
      - ./config/postgres/002_init_db.sh:/docker-entrypoint-initdb.d/002_init_db.sh:ro,z
      - ./config/postgres/003_cyberhub_modules.sql:/docker-entrypoint-initdb.d/003_cyberhub_modules.sql:ro,z
      - ./config/postgres/050_apply_modules.sh:/docker-entrypoint-initdb.d/050_apply_modules.sh:ro,z
      - ./config/postgres/modules:/docker-entrypoint-initdb.d/modules:ro,z
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CORE_DB_USER} -d ${CORE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybercore-net

  # ============================================================================
  # REDIS — Cache, queues, idempotency
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: cybercore-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - cybercore-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybercore-net

  # ============================================================================
  # CYBERHUB APP — Node.js/Express application
  # ============================================================================
  app:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: cybercore-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # CyberCore DB (single source of truth for users, modules, lanes)
      CYBERCORE_DB_HOST: postgres
      CYBERCORE_DB_PORT: 5432
      CYBERCORE_DB_NAME: ${CORE_DB_NAME}
      CYBERCORE_DB_USER: ${CORE_DB_USER}
      CYBERCORE_DB_PASSWORD: ${CORE_DB_PASSWORD}
      # CIAB / legacy plugin DB
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: clinic_db
      DB_USER: ${CORE_DB_USER}
      DB_PASSWORD: ${CORE_DB_PASSWORD}
      # Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      SESSION_SECRET: ${SESSION_SECRET}
      COOKIE_SECURE: "false"
      # N8N
      N8N_BASE_URL: ${N8N_BASE_URL}
      N8N_GENERATE_WEBHOOK: ${N8N_GENERATE_WEBHOOK}
      N8N_DOCUMENT_GENERATOR_WEBHOOK: ${N8N_DOCUMENT_GENERATOR_WEBHOOK}
      N8N_POLICY_WEBHOOK_URL: ${N8N_POLICY_WEBHOOK_URL}
      N8N_EXAMPLES_WEBHOOK: ${N8N_EXAMPLES_WEBHOOK}
      N8N_CHAT_WEBHOOK: ${N8N_CHAT_WEBHOOK}
      N8N_DEPLOY_LANE_WEBHOOK: ${N8N_DEPLOY_LANE_WEBHOOK}
      N8N_TEARDOWN_LANE_WEBHOOK: ${N8N_TEARDOWN_LANE_WEBHOOK}
      # Guacamole
      GUAC_API_URL: ${GUAC_API_URL}
      GUAC_ADMIN_USER: ${GUAC_ADMIN_USER}
      GUAC_ADMIN_PASSWORD: ${GUAC_ADMIN_PASSWORD}
      GUAC_DATASOURCE: postgresql
      # Proxmox
      PROXMOX_API_URL: ${PROXMOX_API_URL}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET}
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - ./front-end/plugins:/app/plugins:rw
      - ./front-end/profiles:/app/profiles:rw
      - ./front-end/vuln-assets:/app/vuln-assets:ro
    networks:
      - cybercore-net

  # ============================================================================
  # N8N — Workflow automation (use patched image)
  # ============================================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.19.4
    container_name: cybercore-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    user: 0:0
    environment:
      N8N_USER_FOLDER: /home/node
      TZ: ${TZ}
      GENERIC_TIMEZONE: ${TZ}
      NODE_ENV: production
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      WEBHOOK_URL: http://0.0.0.0:5678/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      # Task Runners — External Mode Configuration
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_NATIVE_PYTHON_RUNNER: "true"
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
    entrypoint: ["/bin/sh","-lc"]
    command: "/docker-entrypoint-initn8n.sh"
    ports:
      - "0.0.0.0:5678:5678"
    env_file:
      - ./config/secrets.env
    volumes:
      - cybercore-n8n-data:/home/node
      - ./config/n8n/init.sh:/docker-entrypoint-initn8n.sh:ro,z
      - ./config/n8n/workflows:/seed/workflows:ro,z
      - ./config/n8n/credentials:/seed/credentials:ro,z
      - ./config/site.json:/seed/site.json:ro,z
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://0.0.0.0:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - cybercore-net

  # ============================================================================
  # N8N TASK RUNNERS — External mode sidecar (separate JS/Python execution)
  # ============================================================================
  n8n-runners:
    image: n8nio/runners:2.19.4
    container_name: cybercore-n8n-runners
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT: 15
      N8N_RUNNERS_LOG_LEVEL: info
      N8N_RUNNERS_PYTHON_RUNNER: "true"
    networks:
      - cybercore-net

  # ============================================================================
  # ADMINER — Lightweight DB management UI
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: cybercore-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "0.0.0.0:8080:8080"
    networks:
      - cybercore-net

  # ============================================================================
  # FTP — File transfer for profile delivery
  # ============================================================================
  ftp:
    image: fauria/vsftpd:latest
    container_name: cybercore-ftp
    restart: unless-stopped
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASSWORD}
      PASV_ADDRESS: 0.0.0.0
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    ports:
      - "0.0.0.0:21:21"
      - "21100-21110:21100-21110"
    volumes:
      - ./front-end/profiles:/home/vsftpd/${FTP_USER}:rw
    networks:
      - cybercore-net