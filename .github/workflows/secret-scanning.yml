name: Secret Scanning

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly full-history sweep so new detectors catch pre-existing secrets.
    - cron: '0 6 * * 1'

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan-secrets:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # actions/checkout v4.2.2 pinned to SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0 # Required to scan full git history

      - name: Run TruffleHog
        # trufflesecurity/trufflehog v3.95.8 pinned to SHA
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f
        with:
          # PR: scan only the PR diff. Push: scan the pushed range.
          # Schedule/other: base/head empty -> full filesystem+history scan.
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified --fail
