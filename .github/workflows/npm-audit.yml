name: npm Audit

# Audits the currently-installed dependency tree (front-end/package-lock.json)
# against the npm advisory database on every push/PR. This catches vulnerable
# packages already in the tree, complementing:
#   - dependency-review.yml -> gates NEW deps introduced in a PR
#   - dependabot.yml         -> opens update PRs and raises security alerts
on:
  push:
    branches: [ main, dev, 'feat/**' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: npm-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: npm audit (front-end)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front-end
    steps:
      - name: Checkout Repository
        # actions/checkout v4.2.2 pinned to SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        # actions/setup-node v6.4.0 pinned to SHA
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      # Blocking check: fail the build on high/critical advisories. Runs against
      # the whole installed tree on every push, so a stricter threshold here
      # avoids constant red builds on low/moderate transitive advisories that
      # often have no available fix. dependency-review already gates new deps
      # at 'moderate'. Lower this to 'moderate' if you want stricter enforcement.
      - name: Audit production and dev dependencies
        run: npm audit --audit-level=high

      # Informational: full moderate+ report, always visible in the log, never
      # fails the build. Gives you eyes on lower-severity issues without noise.
      - name: Full audit report (informational)
        if: always()
        run: npm audit --audit-level=moderate || true
