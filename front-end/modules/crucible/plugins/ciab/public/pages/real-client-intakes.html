<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(localStorage.getItem("ciab-theme")==="dark")document.documentElement.setAttribute("data-theme","dark")</script>
  <script src="/js/theme-patch.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Client Intakes | Clinic-in-a-Box</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <style>
    .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--gray-200, #e2e8f0); background: var(--bg-card, #fff); color: var(--gray-600, #4a5568); margin-right: 4px; }
    .pill.role-student    { border-color: #3b82f6; color: #1e40af; background: #dbeafe; }
    .pill.role-instructor { border-color: #16a34a; color: #166534; background: #dcfce7; }
    .pill.role-admin      { border-color: #dc2626; color: #991b1b; background: #fee2e2; }
    .pill.status-uploaded { border-color: #d97706; color: #92400e; background: #fef3c7; }
    .pill.status-linked   { border-color: #16a34a; color: #166534; background: #dcfce7; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--gray-500, #718096); }
    .error { color: #dc2626; }
    .hidden { display: none !important; }
    input[type=file] { display: none; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"><!-- Layout.init() injects content --></aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <main class="main-content">
      <header class="main-header">
        <div class="header-left">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        </div>
        <div class="header-right">
          <button class="header-btn" onclick="loadList()" title="Refresh">🔄</button>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">📨 Real-Client Intakes</h1>
            <p class="page-subtitle">Anonymized intake forms submitted for real client engagements. Parallel to the AI-simulated flow — does not replace it.</p>
          </div>
          <div class="d-flex gap-2" style="flex-wrap: wrap;">
            <a class="btn btn-primary" href="/ciab/real-client-intake" target="_blank">✍️ Start new intake</a>
            <a class="btn btn-outline" href="/ciab/real-client-intake" download="real-client-intake-blank.html">📥 Download blank form</a>
            <button class="btn btn-outline" id="btn-upload">⬆️ Upload JSON or HTML</button>
            <input type="file" id="file-input" accept=".json,.html,application/json,text/html" />
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">All Intakes</span>
          </div>
          <div class="card-body">
            <div class="table-container" id="table-wrap">
              <div class="empty">Loading…</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/ciab/js/ciab-api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        if (!await Auth.requireAuth()) return;
        currentUser = Auth.getUser();
        await loadList();
      } catch (err) {
        console.error('Initialization error:', err);
      }
    });

    function escHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    async function loadList() {
      const wrap = document.getElementById('table-wrap');
      try {
        const res = await fetch('/api/real-client/intake', { credentials: 'same-origin' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const body = await res.json();
        if (!body.intakes.length) {
          wrap.innerHTML = '<div class="empty">No intakes uploaded yet. Use <strong>Start new intake</strong> or upload a completed form.</div>';
          return;
        }
        const rows = body.intakes.map(it => {
          const when = new Date(it.created_at).toLocaleString();
          return `
            <tr>
              <td><a href="/ciab/real-client-intake/${escHtml(it.id)}">${escHtml(it.cover_name)}</a></td>
              <td><span class="pill role-${escHtml(it.uploaded_role || 'student')}">${escHtml(it.uploaded_role || '—')}</span></td>
              <td>${escHtml(when)}</td>
              <td><span class="pill status-${escHtml(it.status || 'uploaded')}">${escHtml(it.status || '—')}</span></td>
              <td>${it.linked_challenge_id ? '🎯 linked' : '—'}</td>
              <td>${it.linked_profile_id ? '📁 linked' : '—'}</td>
            </tr>`;
        }).join('');
        wrap.innerHTML = `
          <table class="table">
            <thead>
              <tr>
                <th>Cover name</th>
                <th>Uploader</th>
                <th>Uploaded</th>
                <th>Status</th>
                <th>Challenge</th>
                <th>Profile</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch (err) {
        wrap.innerHTML = `<div class="empty error">Failed to load: ${escHtml(err.message)}</div>`;
      }
    }

    document.getElementById('btn-upload').addEventListener('click', () => document.getElementById('file-input').click());

    document.getElementById('file-input').addEventListener('change', async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const text = String(ev.target.result || '');
          let payload;
          if (/\.html$/i.test(f.name) || /^<!doctype|<html/i.test(text.trim())) {
            const m = text.match(/<script[^>]+id=["']responses["'][^>]*>([\s\S]*?)<\/script>/i);
            if (!m || !m[1].trim()) throw new Error('No embedded responses found in HTML file.');
            payload = JSON.parse(m[1]);
          } else {
            payload = JSON.parse(text);
          }
          const res = await fetch('/api/real-client/intake/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify(payload)
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || ('HTTP ' + res.status));
          }
          const body = await res.json();
          if (window.Toast?.success) Toast.success('Uploaded', body.cover_name);
          await loadList();
        } catch (err) {
          if (window.Toast?.error) Toast.error('Upload failed', err.message);
          else alert('Upload failed: ' + err.message);
        } finally {
          e.target.value = '';
        }
      };
      reader.readAsText(f);
    });
  </script>
</body>
</html>
