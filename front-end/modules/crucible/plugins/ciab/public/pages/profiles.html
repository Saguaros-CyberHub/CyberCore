<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(localStorage.getItem("ciab-theme")==="dark")document.documentElement.setAttribute("data-theme","dark")</script>
  <script src="/js/theme-patch.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profiles | Clinic-in-a-Box</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar (populated by layout.js) -->
    <aside class="sidebar" id="sidebar">
      <!-- Content injected by Layout.init() -->
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <main class="main-content">
      <header class="main-header">
        <div class="header-left">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" placeholder="Search profiles..." id="searchInput">
          </div>
        </div>
        <div class="header-right">
          <button class="header-btn" onclick="loadProfiles()" title="Refresh">🔄</button>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <div>
            <h1 class="page-title">My Profiles</h1>
            <p class="page-subtitle">View and manage your generated client profiles.</p>
          </div>
          <a href="/ciab/generator" class="btn btn-primary">⚡ Generate New</a>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">All Profiles</span>
            <div class="d-flex gap-2" style="flex-wrap: wrap;">
              <select class="form-select" id="filterType" style="width: auto;" onchange="loadProfiles()">
                <option value="">All Types</option>
                <option value="SMB">SMB</option>
                <option value="NonProfit">Non-Profit</option>
                <option value="Utility_IT_OT">Utility</option>
                <option value="K12">K-12</option>
              </select>
              <select class="form-select" id="filterDifficulty" style="width: auto;" onchange="loadProfiles()">
                <option value="">All Difficulties</option>
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
              </select>
              <select class="form-select" id="sortBy" style="width: auto;" onchange="loadProfiles()">
                <option value="created_at">Newest First</option>
                <option value="company_name">Company Name</option>
              </select>
            </div>
          </div>
          <div class="card-body">
            <div class="table-container">
              <table class="table">
                <thead>
                  <tr>
                    <th>Company</th>
                    <th>Type</th>
                    <th>Industry</th>
                    <th>Difficulty</th>
                    <th>Employees</th>
                    <th>Created</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="profilesTable">
                  <tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>
                </tbody>
              </table>
            </div>
            <div class="pagination">
              <div class="pagination-info" id="paginationInfo">Showing 0-0 of 0</div>
              <div class="pagination-buttons" id="paginationButtons"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Delete Profile</span>
        <button class="modal-close" onclick="closeModal('deleteModal')">&times;</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete <strong id="deleteProfileName"></strong>?</p>
        <p class="text-muted">This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('deleteModal')">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/ciab/js/ciab-api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let currentUser = null;
    let currentPage = 1;
    const pageSize = 10;

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const isLoggedIn = await Auth.requireAuth();
        if (!isLoggedIn) return;
        currentUser = Auth.getUser();
        
        // Update UI elements if they exist (added by layout.js)
        updateUserUI();
        
        // Check for search param
        const search = Utils.getQueryParam('search');
        if (search) {
          document.getElementById('searchInput').value = search;
        }
        
        // Load profiles - this is the key call
        await loadProfiles();
      } catch (error) {
        console.error('Initialization error:', error);
        // Still try to load profiles even if auth fails
        loadProfiles();
      }
    });

    function updateUserUI() {
      if (!currentUser) return;
      
      // Safely update elements only if they exist
      const userNameEl = document.getElementById('userName');
      const userRoleEl = document.getElementById('userRole');
      const userAvatarEl = document.getElementById('userAvatar');
      
      if (userNameEl) {
        userNameEl.textContent = `${currentUser.firstName} ${currentUser.lastName}`;
      }
      if (userRoleEl) {
        userRoleEl.textContent = currentUser.role;
      }
      if (userAvatarEl && typeof Utils !== 'undefined') {
        userAvatarEl.textContent = Utils.getInitials(currentUser.firstName, currentUser.lastName);
      }
    }

    async function loadProfiles() {
      const params = {
        page: currentPage,
        limit: pageSize,
        sortBy: document.getElementById('sortBy').value,
        sortOrder: 'desc'
      };

      const clientType = document.getElementById('filterType').value;
      const difficulty = document.getElementById('filterDifficulty').value;
      const search = document.getElementById('searchInput').value.trim();

      if (clientType) params.clientType = clientType;
      if (difficulty) params.difficulty = difficulty;
      if (search) params.search = search;

      try {
        const data = await API.profiles.list(params);
        renderProfiles(data.profiles || []);
        renderPagination(data.pagination || { page: 1, limit: pageSize, total: 0, totalPages: 1 });
      } catch (error) {
        console.error('Failed to load profiles:', error);
        // Show error state in table
        document.getElementById('profilesTable').innerHTML = 
          `<tr><td colspan="8" class="text-center text-muted">Failed to load profiles. <button class="btn btn-sm btn-primary" onclick="loadProfiles()">Try Again</button></td></tr>`;
        if (typeof Toast !== 'undefined') {
          Toast.error('Error', 'Failed to load profiles');
        }
      }
    }

    function renderProfiles(profiles) {
      const tbody = document.getElementById('profilesTable');
      
      if (!profiles || profiles.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No profiles found. <a href="/ciab/generator">Generate your first profile</a></td></tr>`;
        return;
      }

      tbody.innerHTML = profiles.map(p => `
        <tr>
          <td>
            <strong>${Utils.escapeHtml(p.companyName || 'Unnamed')}</strong>
            ${p.hqCity ? `<br><small class="text-muted">${Utils.escapeHtml(p.hqCity)}</small>` : ''}
          </td>
          <td><span class="badge ${Utils.getClientTypeBadgeClass(p.clientType)}">${p.clientTypeName || p.clientType}</span></td>
          <td>${Utils.escapeHtml(p.industry || '-')}</td>
          <td><span class="badge ${Utils.getDifficultyBadgeClass(p.difficulty)}">${p.difficulty}</span></td>
          <td>${p.employeeCount || '-'}</td>
          <td>${Utils.formatDate(p.createdAt)}</td>
          <td><span class="badge badge-${p.status === 'completed' ? 'success' : p.status === 'failed' ? 'danger' : 'warning'}"><span class="status-dot"></span>${p.status}</span></td>
          <td>
            ${p.htmlFilePath ? `<a href="${p.htmlFilePath}" target="_blank" class="btn btn-sm btn-ghost" title="View HTML">📄</a>` : ''}
            ${p.jsonFilePath ? `<a href="${p.jsonFilePath}" target="_blank" class="btn btn-sm btn-ghost" title="View JSON">📊</a>` : ''}
            <button class="btn btn-sm btn-ghost" onclick="confirmDelete('${p.id}', '${Utils.escapeHtml(p.companyName || 'this profile')}')" title="Delete">🗑️</button>
          </td>
        </tr>
      `).join('');
    }

    function renderPagination(pagination) {
      const { page, limit, total, totalPages } = pagination;
      const start = (page - 1) * limit + 1;
      const end = Math.min(page * limit, total);
      
      document.getElementById('paginationInfo').textContent = `Showing ${total > 0 ? start : 0}-${end} of ${total}`;
      
      let buttons = '';
      if (totalPages > 0) {
        buttons += `<button class="page-btn" onclick="goToPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>←</button>`;
        for (let i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= page - 1 && i <= page + 1)) {
            buttons += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
          } else if (i === page - 2 || i === page + 2) {
            buttons += `<span style="padding: 0 0.5rem;">...</span>`;
          }
        }
        buttons += `<button class="page-btn" onclick="goToPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>→</button>`;
      }
      document.getElementById('paginationButtons').innerHTML = buttons;
    }

    function goToPage(page) {
      currentPage = page;
      loadProfiles();
    }

    let deleteProfileId = null;
    function confirmDelete(id, name) {
      deleteProfileId = id;
      document.getElementById('deleteProfileName').textContent = name;
      document.getElementById('deleteModal').classList.add('active');
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      if (!deleteProfileId) return;
      try {
        await API.profiles.delete(deleteProfileId);
        Toast.success('Deleted', 'Profile deleted successfully');
        closeModal('deleteModal');
        loadProfiles();
      } catch (error) {
        Toast.error('Error', 'Failed to delete profile');
      }
    });

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('active');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('active');
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        currentPage = 1;
        loadProfiles();
      }
    });
  </script>
</body>
</html>
