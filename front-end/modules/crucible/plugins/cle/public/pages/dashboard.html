<!DOCTYPE html>
<html lang="en">
<head>
  <script>if(localStorage.getItem("ciab-theme")==="dark")document.documentElement.setAttribute("data-theme","dark")</script>
  <script src="/js/theme-patch.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Cyber Learning Environment</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <style>
    .cle-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card-bg, white); border-radius: 12px; padding: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
    .stat-card .val { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
    .stat-card .lbl { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
    .group-card { background: var(--card-bg, white); border-radius: 12px; padding: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 1rem; }
    .group-card h3 { margin: 0 0 0.5rem; font-size: 1.1rem; }
    .group-meta { display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--text-secondary); flex-wrap: wrap; }
    .group-meta span { display: flex; align-items: center; gap: 0.3rem; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; color: white; }
    .badge-active { background: #38a169; }
    .badge-pending { background: #d69e2e; }
    .quick-links { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
    .quick-links a { font-size: 0.85rem; color: var(--accent, #3b82f6); text-decoration: none; font-weight: 500; }
    .quick-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="main-header">
        <div class="header-left">
          <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
          <h2 style="margin:0; font-size:1.1rem;">Cyber Learning Environment</h2>
        </div>
      </header>
      <div class="page-content">
        <p style="color:var(--text-secondary); margin-bottom:1.5rem;">Manage your class environments, students, and VM access.</p>

        <div class="cle-stats" id="statsRow">
          <div class="stat-card"><div class="val" id="statCourses">-</div><div class="lbl">My Courses</div></div>
          <div class="stat-card"><div class="val" id="statStudents">-</div><div class="lbl">Total Students</div></div>
          <div class="stat-card"><div class="val" id="statMaterials">-</div><div class="lbl">Course Materials</div></div>
          <div class="stat-card"><div class="val" id="statSessions">-</div><div class="lbl">Sessions (7d)</div></div>
        </div>

        <h2 style="font-size:1.1rem; font-weight:600; margin-bottom:0.75rem;">My Courses</h2>
        <div id="groupsList"><p style="color:var(--text-secondary);">Loading...</p></div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    const TOKEN = () => localStorage.getItem('token');
    const headers = () => ({ 'Authorization': `Bearer ${TOKEN()}`, 'Content-Type': 'application/json' });

    async function api(method, path, body) {
      const opts = { method, headers: headers() };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch('/api/cle' + path, opts);
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
      return res.json();
    }

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function loadDashboard() {
      try {
        const coursesData = await api('GET', '/courses');
        const courses = coursesData.courses || [];
        let totalStudents = 0;
        let totalMaterials = 0;

        // Calculate total students and materials
        for (const course of courses) {
          totalStudents += parseInt(course.student_count) || 0;
          totalMaterials += parseInt(course.material_count) || 0;
        }

        document.getElementById('statCourses').textContent = courses.length;
        document.getElementById('statStudents').textContent = totalStudents;
        document.getElementById('statMaterials').textContent = totalMaterials;

        // Try session count
        try {
          const sessions = await api('GET', '/sessions?from=' + new Date(Date.now() - 7 * 86400000).toISOString());
          document.getElementById('statSessions').textContent = sessions.sessions?.length || 0;
        } catch (_) {
          document.getElementById('statSessions').textContent = '-';
        }

        if (courses.length === 0) {
          document.getElementById('groupsList').innerHTML = '<p style="color:var(--text-secondary);">No courses found. Create your first course to get started.</p>';
          return;
        }

        document.getElementById('groupsList').innerHTML = courses.map(c => `
          <div class="group-card">
            <h3>${escHtml(c.course_name)}</h3>
            <div class="group-meta">
              <span>📝 ${escHtml(c.code || 'No code')}</span>
              <span>👥 ${c.student_count || 0} students</span>
              <span>📚 ${c.material_count || 0} materials</span>
              <span>📅 Created ${new Date(c.created_at).toLocaleDateString()}</span>
            </div>
            <div class="quick-links">
              <a href="/cle/courses#course=${c.course_id}">View Course</a>
              <a href="/cle/sessions">Session Log</a>
            </div>
          </div>`).join('');
      } catch (e) {
        document.getElementById('groupsList').innerHTML = `<p style="color:#e53e3e;">Error: ${escHtml(e.message)}</p>`;
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const isLoggedIn = await Auth.requireAuth();
      if (!isLoggedIn) return;
      Layout.init('cle');
      loadDashboard();
    });
  </script>
</body>
</html>
