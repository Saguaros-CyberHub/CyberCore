<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Clinic-in-a-Box</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🏥</div>
        <h1>Clinic-in-a-Box</h1>
        <p>Cyber Risk Assessment Training Platform</p>
      </div>
      
      <div class="auth-body">
        <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" class="form-input" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            <div class="form-error" id="emailError"></div>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-input" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            <div class="form-error" id="passwordError"></div>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
            Sign In
          </button>
        </form>
        
        <div class="auth-footer">
          <p>Don't have an account? <a href="/register">Create one</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorAlert = document.getElementById('errorAlert');

      // Check if redirected due to expired session
      if (Utils.getQueryParam('expired')) {
        errorAlert.textContent = 'Your session has expired. Please sign in again.';
        errorAlert.style.display = 'block';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Clear errors
        errorAlert.style.display = 'none';
        document.getElementById('emailError').textContent = '';
        document.getElementById('passwordError').textContent = '';

        // Validate
        let hasError = false;
        
        if (!Validator.email(email)) {
          document.getElementById('emailError').textContent = 'Please enter a valid email address';
          hasError = true;
        }
        
        if (!Validator.required(password)) {
          document.getElementById('passwordError').textContent = 'Password is required';
          hasError = true;
        }

        if (hasError) return;

        // Submit
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';

        try {
          const result = await API.auth.login(email, password);
          
          // Store the token in localStorage
          if (result.token) {
            localStorage.setItem('token', result.token);
          }
          
          // Success - redirect to dashboard
          Toast.success('Welcome!', 'Signed in successfully');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 500);
          
        } catch (error) {
          errorAlert.textContent = error.message || 'Invalid email or password';
          errorAlert.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });
    });
  </script>
</body>
</html>
