; ============================================================================
; CyberSaguaros Research Portal — PHP-FPM pool
; ============================================================================
; Installed into /etc/php/<version>/fpm/pool.d/cybersaguaros.conf by the bake
; script. Runs the portal as the unprivileged `saguarobot` user — a webshell
; uploaded through Cloud Storage, and any reverse shell from it, lands as
; saguarobot (the foothold the LinPE stage escalates from).
; ============================================================================

[cybersaguaros]
user = saguarobot
group = saguarobot

; Fixed socket name so the nginx config is independent of the PHP version.
listen = /run/php/php-fpm-cybersaguaros.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 12
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

php_admin_value[upload_max_filesize] = 16M
php_admin_value[post_max_size] = 16M
