# ============================================================================
# CyberSaguaros Research Portal — nginx site config
# ============================================================================
# Installed to /etc/nginx/sites-available/cybersaguaros by the bake script.
# The PHP-FPM socket name is fixed (version-independent) — the bake script
# points the cybersaguaros pool at it regardless of the PHP version Debian
# ships.
# ============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/cybersaguaros/public;
    index index.php index.html;

    client_max_body_size 16m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Internal provisioning API — loopback only.
    # ^~ makes this prefix authoritative so it wins over the generic \.php$
    # regex location below; allow/deny then gates it to 127.0.0.1.
    # Reachable in practice only via the SaguaroBot SSRF (which originates
    # the request from the server itself).
    location ^~ /api/internal/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php-fpm-cybersaguaros.sock;
        }
    }

    # Generic PHP handler. NOTE: this regex also matches /uploads/*.php, so
    # any PHP file written into the gallery uploads directory is executed —
    # the deliberate misconfiguration behind the file-upload RCE.
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm-cybersaguaros.sock;
    }

    # App internals (config.php with DB creds, schema) live OUTSIDE this
    # webroot (in /var/www/cybersaguaros/includes and /db) and are not
    # web-reachable. Block dotfiles as basic hygiene.
    location ~ /\. {
        deny all;
    }
}
