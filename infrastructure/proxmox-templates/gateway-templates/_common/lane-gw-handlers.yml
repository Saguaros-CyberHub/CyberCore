---
# Shared handlers for the lane gateway templates.
- name: restart dnsmasq
  ansible.builtin.command: rc-service dnsmasq restart
  failed_when: false

- name: restart iptables
  ansible.builtin.command: rc-service iptables restart
  failed_when: false

- name: restart chrony
  ansible.builtin.command: rc-service chronyd restart
  failed_when: false

- name: restart rsyslog
  ansible.builtin.command: rc-service rsyslog restart
  failed_when: false

- name: restart sshd
  ansible.builtin.command: rc-service sshd restart
  failed_when: false

