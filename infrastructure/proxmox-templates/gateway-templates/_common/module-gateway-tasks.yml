---
# Shared task list for the module transit gateways. Imported by the per-module
# {crucible,cyberlabs,forge}-gateway.yml wrappers. Do not run directly.
# -------------------------
# Base packages + services
# -------------------------
- name: Ensure required packages are installed
  apk:
    name:
      - openrc
      - iptables
      - dnsmasq
      - chrony
      - rsyslog
      - openssh
    state: present
    update_cache: true

- name: Enable services at boot (OpenRC)
  command: rc-update add {{ item }} default
  register: rcupdate_out
  changed_when: "'added to runlevel default' in rcupdate_out.stdout"
  failed_when: false
  loop:
    - iptables
    - dnsmasq
    - chronyd
    - rsyslog
    - sshd

# sysctl is a boot-time service on Alpine; enabling it ensures ip_forward persists across clones/reboots
- name: Enable sysctl at boot (OpenRC)
  command: rc-update add sysctl boot
  register: rcupdate_sysctl
  changed_when: "'added to runlevel boot' in rcupdate_sysctl.stdout"
  failed_when: false

- name: Ensure SSHD is started (so Ansible doesn't lock itself out mid-run)
  command: rc-service sshd start
  register: sshd_start
  changed_when: "'started' in sshd_start.stdout or 'Starting' in sshd_start.stdout"
  failed_when: false

# -------------------------
# Sysctl & SSH hardening
# -------------------------
- name: Enable IPv4 forwarding and disable IPv6 (sysctl.conf)
  blockinfile:
    path: /etc/sysctl.conf
    create: true
    marker: "# {mark} ANSIBLE GATEWAY SYSCTL"
    block: |
      net.ipv4.ip_forward=1
      net.ipv6.conf.all.disable_ipv6=1
      net.ipv6.conf.default.disable_ipv6=1

- name: Apply sysctl settings
  command: sysctl -p
  changed_when: false

# Extra safety: set it live in case the container boots without applying sysctl.conf
- name: Ensure IPv4 forwarding is active now
  command: sysctl -w net.ipv4.ip_forward=1
  changed_when: false

- name: Harden SSH daemon (key-only access)
  blockinfile:
    path: /etc/ssh/sshd_config
    create: false
    marker: "# {mark} ANSIBLE GATEWAY SSH HARDENING"
    block: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      UsePAM no
  notify: restart sshd

# -------------------------
# LAN interface addressing
# -------------------------
- name: Check if lan0 already has correct address
  command: ip addr show dev {{ lan_if }}
  register: lan_addr_check
  changed_when: false
  failed_when: false

- name: Ensure lan0 has the correct /16 address (idempotent)
  shell: |
    set -e
    ip -4 addr flush dev {{ lan_if }}
    ip addr add {{ lan_cidr }} dev {{ lan_if }}
    ip link set {{ lan_if }} up
  args:
    executable: /bin/sh
  when: lan_cidr not in lan_addr_check.stdout

# Skipped when manage_interfaces=false (Proxmox-managed LXC): addressing is
# then set via pct config and wan0 is an ordinary static LAN port.
- name: Persist WAN/LAN interface config across reboot (Alpine ifupdown)
  blockinfile:
    path: /etc/network/interfaces
    create: true
    marker: "# {mark} ANSIBLE GATEWAY INTERFACES"
    block: |
      auto lo
      iface lo inet loopback

      auto {{ wan_if }}
      iface {{ wan_if }} inet {{ wan_mode }}
      {% if wan_mode == 'static' %}
        address {{ wan_ip }}
        netmask {{ wan_netmask | default('255.255.255.0') }}
        gateway {{ wan_gw }}
      {% endif %}

      auto {{ lan_if }}
      iface {{ lan_if }} inet static
        address {{ lan_gw }}
        netmask {{ lan_netmask }}
  when: manage_interfaces | bool

# -------------------------
# WAN interface addressing (DHCP)
# -------------------------
- name: Check if wan0 already has an IPv4 address
  command: ip -4 addr show dev {{ wan_if }}
  register: wan_addr_check
  changed_when: false
  failed_when: false

- name: Bring up wan0 and request DHCP if missing
  shell: |
    set -e
    ip link set {{ wan_if }} up
    if ! ip -4 addr show dev {{ wan_if }} | grep -q "inet "; then
      # BusyBox udhcpc is present by default on Alpine
      udhcpc -i {{ wan_if }} -q -n -t 5 || true
    fi
  args:
    executable: /bin/sh
  when:
    - manage_interfaces | bool
    - wan_mode == 'dhcp'
    - '"inet " not in wan_addr_check.stdout'

# -------------------------
# dnsmasq (DHCP + gateway-controlled DNS forwarding)
# -------------------------
- name: Ensure dnsmasq.d exists
  file:
    path: "{{ dnsmasq_dropin_dir }}"
    state: directory
    mode: "0755"

- name: Ensure dnsmasq.conf includes dnsmasq.d drop-ins
  lineinfile:
    path: /etc/dnsmasq.conf
    line: "conf-dir={{ dnsmasq_dropin_dir }},*.conf"
    create: true
    state: present

- name: Remove legacy lane directives from /etc/dnsmasq.conf (prevent duplicates)
  replace:
    path: /etc/dnsmasq.conf
    regexp: '^(interface|bind-interfaces|dhcp-range|dhcp-option|dhcp-leasefile|no-resolv|server|log-dhcp|local-service)(=|\s).*$'
    replace: ''
  notify: restart dnsmasq
  failed_when: false
- name: Install dnsmasq config (drop-in)
  copy:
    dest: "{{ dnsmasq_dropin_file }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # Gateway dnsmasq config (Model A)
      interface={{ lan_if }}
      bind-interfaces

      dhcp-range={{ lan_pool_start }},{{ lan_pool_end }},{{ lan_netmask }},{{ dhcp_lease_time }}
      dhcp-option=3,{{ lan_gw }}
      dhcp-option=6,{{ dhcp_dns_servers | join(',') }}

      # Use WAN DHCP resolvers from /etc/resolv.conf
      # (no-resolv and server= omitted to prevent self-referential DNS loop)

      # Hygiene + logs
      domain-needed
      bogus-priv
      log-dhcp
  notify: restart dnsmasq

- name: Validate dnsmasq config before starting/restarting
  command: dnsmasq --test
  changed_when: false

- name: Check wan0 has IP before starting dnsmasq (safety check)
  shell: |
    set -e
    attempt=0
    max_attempts=30
    while [ $attempt -lt $max_attempts ]; do
      if ip -4 addr show dev {{ wan_if }} | grep -q "inet "; then
        exit 0
      fi
      sleep 1
      attempt=$((attempt + 1))
    done
    echo "ERROR: {{ wan_if }} did not get DHCP address after 30s"
    exit 1
  args:
    executable: /bin/sh

- name: Validate upstream DNS resolvers exist (from WAN DHCP)
  shell: |
    grep -qE '^[[:space:]]*nameserver[[:space:]]+[0-9]+\.' /etc/resolv.conf
  args:
    executable: /bin/sh
  changed_when: false

- name: Ensure dnsmasq is started
  command: rc-service dnsmasq start
  register: dnsmasq_start
  changed_when: "'started' in dnsmasq_start.stdout or 'Starting' in dnsmasq_start.stdout"
  failed_when: false

# -------------------------
# Time synchronization (chrony)
# -------------------------
- name: Configure chrony for NTP
  blockinfile:
    path: "{{ chrony_conf_path }}"
    create: true
    marker: "# {mark} ANSIBLE GATEWAY NTP CONFIG"
    block: |
      # Upstream NTP servers
      pool 0.alpine.pool.ntp.org iburst maxsources 3
      pool 1.alpine.pool.ntp.org iburst maxsources 3
      pool 2.alpine.pool.ntp.org iburst maxsources 3
      pool 3.alpine.pool.ntp.org iburst maxsources 3

      # Allow lane clients to query time
      allow {{ lan_net }}
  notify: restart chrony

- name: Ensure chrony is started
  command: rc-service chronyd start
  register: chrony_start
  changed_when: "'started' in chrony_start.stdout or 'Starting' in chrony_start.stdout"
  failed_when: false

# -------------------------
# Logging/SIEM export (rsyslog) - optional
# -------------------------
- name: Ensure rsyslog drop-in directory exists
  file:
    path: "{{ rsyslog_dropin_dir }}"
    state: directory
    mode: "0755"

# Avoid the LXC /proc/kmsg spam (non-fatal but annoying)
- name: Disable kernel log input in rsyslog for LXC (avoid /proc/kmsg permission errors)
  copy:
    dest: "{{ rsyslog_dropin_dir }}/01-lxc-no-kmsg.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      # LXC note: /proc/kmsg is typically not accessible in containers.
      # If your base config loads imklog, it may log warnings. We don't require kernel log input here.
      # (No-op file; we rely on not loading imklog in main config.)
  notify: restart rsyslog
  failed_when: false

- name: Configure rsyslog with conditional SIEM export (drop-in)
  copy:
    dest: "{{ rsyslog_dropin_file }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # Gateway rsyslog forwarder
      {% if siem_server %}
      *.* @@{{ siem_server }}:{{ syslog_port }}
      {% endif %}
  notify: restart rsyslog

- name: Ensure rsyslog is started
  command: rc-service rsyslog start
  register: rsyslog_start
  changed_when: "'started' in rsyslog_start.stdout or 'Starting' in rsyslog_start.stdout"
  failed_when: false

# -------------------------
# iptables rules (golden state)
# -------------------------
- name: Ensure /etc/iptables exists
  file:
    path: /etc/iptables
    state: directory
    mode: "0755"

- name: Install persistent iptables rules-save
  copy:
    dest: "{{ iptables_rules_path }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      *filter
      :INPUT DROP [0:0]
      :FORWARD DROP [0:0]
      :OUTPUT ACCEPT [0:0]

      # --- INPUT (router local) ---
      -A INPUT -i lo -j ACCEPT
      -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT

      # DHCP + DNS for lane clients (to the gateway)
      -A INPUT -i {{ lan_if }} -p udp --dport 67:68 -j ACCEPT
      -A INPUT -i {{ lan_if }} -p udp --dport 53 -j ACCEPT
      -A INPUT -i {{ lan_if }} -p tcp --dport 53 -j ACCEPT

      # Allow clients to query time (NTP)
      -A INPUT -i {{ lan_if }} -p udp --dport 123 -j ACCEPT

      # Allow clients to ping the gateway
      -A INPUT -i {{ lan_if }} -p icmp --icmp-type echo-request -j ACCEPT
      # Allow ICMP replies and diagnostics from WAN
      -A INPUT -i {{ wan_if }} -p icmp --icmp-type echo-reply -j ACCEPT
      -A INPUT -i {{ wan_if }} -p icmp --icmp-type time-exceeded -j ACCEPT
      -A INPUT -i {{ wan_if }} -p icmp --icmp-type destination-unreachable -j ACCEPT

      # Management SSH access from trusted subnets (WAN-side only)
      {% for mgmt_subnet in mgmt_subnets %}
      -A INPUT -i {{ wan_if }} -s {{ mgmt_subnet }} -p tcp --dport {{ mgmt_ssh_port }} -m conntrack --ctstate NEW -j ACCEPT
      {% endfor %}

      # --- FORWARD (traffic routed through the transit gateway) ---
      # Allow return traffic (ESTABLISHED,RELATED from both directions)
      -A FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT

      # Inbound from VPN: allow SSH to lane gateways
      -A FORWARD -s 10.0.254.0/24 -d 100.102.0.0/16 -p tcp --dport 22 -m conntrack --ctstate NEW -j ACCEPT

      # Inbound from Guacamole: allow RDP and SSH to lane gateways (for DNAT to internal VMs)
      {% if guac_server_ip %}
      -A FORWARD -s {{ guac_server_ip }} -d 100.102.0.0/16 -p tcp -m multiport --dports 22,3389 -m conntrack --ctstate NEW -j ACCEPT
      # Explicit rule: Guacamole RDP to all lanes via DNAT
      -A FORWARD -s {{ guac_server_ip }} -d 192.18.0.0/24 -p tcp --dport 3389 -j ACCEPT
      {% endif %}

      # Allow ICMP for diagnostics (ping, traceroute) in both directions
      -A FORWARD -p icmp -m conntrack --ctstate NEW,ESTABLISHED,RELATED -j ACCEPT

      # Outbound from lanes: allow SSH to external Guacamole (for lane->guac direction if needed)
      {% if guac_server_ip %}
      -A FORWARD -i {{ lan_if }} -d {{ guac_server_ip }} -p tcp -m multiport --dports 22,3389 -m conntrack --ctstate NEW -j ACCEPT
      {% endif %}

      # Anti-breakout: block internal/private/infrastructure destinations first
      {% for cidr in blocked_cidrs %}
      -A FORWARD -i {{ lan_if }} -d {{ cidr }} -j DROP
      {% endfor %}

      # Block forwarded access to other hosts in this module transit zone
      {% if transit_zone %}
      -A FORWARD -i {{ lan_if }} -d {{ transit_zone }} -j DROP
      {% endif %}

      # Prevent DNS bypass: lane gateways/clients must use the transit gateway for DNS
      {% if block_direct_dns_to_wan %}
      -A FORWARD -i {{ lan_if }} -p udp --dport 53 -j REJECT --reject-with icmp-port-unreachable
      -A FORWARD -i {{ lan_if }} -p tcp --dport 53 -j REJECT --reject-with icmp-port-unreachable
      {% endif %}

      # Prevent NTP bypass: lane gateways/clients must use the transit gateway for time
      {% if block_direct_ntp_to_wan %}
      -A FORWARD -i {{ lan_if }} -p udp --dport 123 -j REJECT --reject-with icmp-port-unreachable
      {% endif %}

      # General internet egress from lane -> WAN
      {% if allow_all_outbound_tcp %}
      -A FORWARD -i {{ lan_if }} -o {{ wan_if }} -p tcp -m conntrack --ctstate NEW -j ACCEPT
      {% else %}
      {% for p in allow_out_tcp_ports %}
      -A FORWARD -i {{ lan_if }} -o {{ wan_if }} -p tcp --dport {{ p }} -m conntrack --ctstate NEW -j ACCEPT
      {% endfor %}
      {% endif %}

      {% if allow_icmp_forward %}
      -A FORWARD -i {{ lan_if }} -o {{ wan_if }} -p icmp -m conntrack --ctstate NEW -j ACCEPT
      {% endif %}

      {% for p in allow_out_udp_ports %}
      -A FORWARD -i {{ lan_if }} -o {{ wan_if }} -p udp --dport {{ p }} -m conntrack --ctstate NEW -j ACCEPT
      {% endfor %}

      # No unsolicited inbound WAN -> LAN
      -A FORWARD -i {{ wan_if }} -o {{ lan_if }} -j DROP

      # --- OUTPUT (gateway itself) ---
      # Allow gateway to send syslog to SIEM (if configured)
      {% if siem_server %}
      -A OUTPUT -o {{ wan_if }} -d {{ siem_server }} -p tcp --dport {{ syslog_port }} -m conntrack --ctstate NEW,ESTABLISHED -j ACCEPT
      {% endif %}

      COMMIT

      *nat
      :PREROUTING ACCEPT [0:0]
      :INPUT ACCEPT [0:0]
      :OUTPUT ACCEPT [0:0]
      :POSTROUTING ACCEPT [0:0]
      # NAT only the lane subnet out the uplink
      -A POSTROUTING -s {{ lan_net }} -o {{ wan_if }} -j MASQUERADE
      COMMIT

      *mangle
      :PREROUTING ACCEPT [0:0]
      :INPUT ACCEPT [0:0]
      :FORWARD ACCEPT [0:0]
      :OUTPUT ACCEPT [0:0]
      :POSTROUTING ACCEPT [0:0]
      -A FORWARD -i {{ lan_if }} -o {{ wan_if }} -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
      -A FORWARD -i {{ wan_if }} -o {{ lan_if }} -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
      COMMIT

- name: Flush existing iptables rules (filter, nat, mangle tables)
  command: "{{ item }}"
  loop:
    - iptables -F
    - iptables -F -t nat
    - iptables -F -t mangle
    - iptables -X
    - iptables -X -t nat
    - iptables -X -t mangle
  changed_when: false
  failed_when: false

- name: Load iptables rules from rules-save file (iptables-restore)
  shell: iptables-restore < "{{ iptables_rules_path }}"
  args:
    executable: /bin/sh
  changed_when: false

- name: Ensure iptables service is restarted (reloads rules-save)
  command: rc-service iptables restart
  register: iptables_restart
  changed_when: "'restarted' in iptables_restart.stdout or 'Restarting' in iptables_restart.stdout or 'started' in iptables_restart.stdout"
  failed_when: false

# -------------------------
# Sanity checks (non-fatal)
# -------------------------
- name: Show interface summary
  command: ip addr show
  register: ip_show
  changed_when: false
  failed_when: false

- name: Show dnsmasq status
  command: rc-service dnsmasq status
  register: dnsmasq_status
  changed_when: false
  failed_when: false

- name: Show iptables FORWARD summary
  command: iptables -L FORWARD -n -v
  register: ipt_fwd
  changed_when: false
  failed_when: false

- name: Print summaries
  debug:
    msg:
      - "{{ ip_show.stdout | default('ip addr show unavailable') }}"
      - "{{ dnsmasq_status.stdout | default('dnsmasq status unavailable') }}"
